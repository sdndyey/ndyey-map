<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 深大诺德幼儿园 · 园本课程教育资源地图</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #FFF8F0; --text: #4A3728; --text-light: #8B7355;
  --border: #E8D5C4;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow: hidden;
}

/* Header */
.header {
  position: relative; z-index: 1000;
  background: linear-gradient(135deg, #FFE8D6 0%, #FFF8F0 40%, #E8F5E9 100%);
  border-bottom: 3px solid #FFDAB9;
  padding: 10px 16px; display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06); flex-shrink: 0;
}
.header-logo { width: 40px; height: 40px; border-radius: 6px; flex-shrink: 0; }
.header-title { font-family: 'ZCOOL KuaiLe', cursive; font-size: 20px; color: #5D4037; white-space: nowrap; }
.header-subtitle { font-size: 12px; color: #8D6E63; margin-top: -2px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.search-wrap { position: relative; }
.search-wrap input {
  width: 200px; padding: 8px 12px 8px 36px;
  border: 2px solid #E8D5C4; border-radius: 20px;
  font-size: 13px; background: #FFFBFA; color: var(--text);
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus { border-color: #FFB74D; box-shadow: 0 0 0 3px rgba(255,183,77,0.15); }
.search-wrap .search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); font-size: 16px; color: #BDBDBD; pointer-events: none;
}

/* Main */
.main-wrap { display: flex; height: calc(100vh - 72px); position: relative; }

/* Sidebar */
.sidebar {
  width: 300px; min-width: 300px;
  background: #FFFBFA; border-right: 2px solid var(--border);
  overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 900; transition: transform 0.3s;
}
.sidebar-toggle {
  display: none; position: absolute; left: 0; top: 50%;
  z-index: 1001; background: #FFE0B2;
  border: 2px solid #FFB74D; border-left: none;
  border-radius: 0 12px 12px 0; width: 32px; height: 64px;
  cursor: pointer; font-size: 18px; color: #5D4037;
  transform: translateY(-50%);
}
.sidebar-section-title { font-family: 'ZCOOL KuaiLe', cursive; font-size: 15px; color: #5D4037; display: flex; align-items: center; gap: 6px; margin-top: 4px; }

/* Category accordion */
.cat-accordion { display: flex; flex-direction: column; gap: 4px; }
.cat-group { border-radius: 12px; overflow: hidden; border: 2px solid transparent; background: #FFFDF9; transition: all 0.2s; }
.cat-group.active-group { border-color: #FFDAB9; }

.cat-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; cursor: pointer;
  user-select: none; border-radius: 10px;
}
.cat-header:hover { background: #FFF3E0; }

.cat-checkbox {
  width: 20px; height: 20px; border-radius: 6px;
  border: 2px solid #ccc; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #fff; transition: all 0.15s;
}
.cat-checkbox.checked { border-color: transparent; }
.cat-checkbox.checked::after { content: '✓'; font-weight: 700; }

.cat-dot-sm { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-name-sm { flex: 1; font-size: 13px; font-weight: 600; }
.cat-count-sm { font-size: 11px; color: #999; background: #f0f0f0; padding: 1px 8px; border-radius: 10px; }
.cat-arrow { font-size: 12px; color: #bbb; transition: transform 0.25s; }
.cat-arrow.open { transform: rotate(90deg); }

/* Item list */
.cat-items {
  max-height: 0; overflow: hidden;
  transition: max-height 0.35s ease;
}
.cat-items.open { max-height: 2000px; overflow-y: auto; }

.cat-item-row {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px 7px 36px;
  font-size: 12px; color: var(--text-light);
  cursor: pointer; transition: background 0.12s;
  border-bottom: 1px solid #FFF3E0;
}
.cat-item-row:hover { background: #FFF3E0; color: #F57C00; }
.cat-item-row .item-icon { font-size: 13px; flex-shrink: 0; }
.cat-item-row .item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-item-row .item-dist { font-size: 10px; color: #bbb; flex-shrink: 0; }
.cat-item-row.highlight { background: #FFF8E1; color: #F57F17; font-weight: 600; }

/* Legend */
.legend-box { background: #FFFDF9; border: 2px dashed #E8D5C4; border-radius: 12px; padding: 10px; font-size: 11px; color: var(--text-light); line-height: 1.8; }
.stats-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }

/* Map */
.map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* Popup */
.custom-popup .leaflet-popup-content-wrapper {
  background: #FFFDF9; border-radius: 16px;
  border: 2px solid #FFDAB9;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  padding: 0; overflow: hidden;
}
.custom-popup .leaflet-popup-content { margin: 0; min-width: 240px; max-width: 340px; }
.custom-popup .leaflet-popup-tip { background: #FFDAB9; }
.custom-popup .leaflet-popup-close-button { top: 8px; right: 8px; color: #8D6E63; font-size: 18px; }
.popup-header { padding: 14px 16px 10px; border-bottom: 2px dashed #E8D5C4; }
.popup-name { font-family: 'ZCOOL KuaiLe', cursive; font-size: 18px; color: var(--text); margin-bottom: 4px; }
.popup-cat-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; color: #fff; }
.popup-body { padding: 12px 16px; }
.popup-row { display: flex; gap: 6px; margin-bottom: 6px; font-size: 13px; line-height: 1.6; align-items: flex-start; }
.popup-label { font-size: 15px; flex-shrink: 0; }
.popup-value { color: var(--text-light); }
.popup-section-title { font-size: 12px; font-weight: 700; color: #5D4037; margin-top: 8px; margin-bottom: 4px; padding: 4px 8px; background: #FFF3E0; border-radius: 8px; display: inline-block; }
.popup-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.popup-tag { padding: 3px 8px; background: #FFF3E0; border-radius: 10px; font-size: 11px; color: #F57C00; }
.popup-note { margin-top:8px; padding:6px 10px; background:#FFF8E1; border-radius:8px; font-size:11px; color:#F57F17; }

/* Photos in popup */
.popup-photos { display: flex; gap: 6px; margin-top: 10px; overflow-x: auto; padding-bottom: 4px; }
.popup-photos img { width: 80px; height: 60px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; flex-shrink: 0; }
.popup-photos img:hover { border-color: #FFB74D; }

/* Lightbox */
.lightbox-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; cursor: pointer; }
.lightbox-overlay.show { display: flex; }
.lightbox-overlay img { max-width: 90vw; max-height: 90vh; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
.lightbox-close { position: absolute; top: 20px; right: 30px; font-size: 40px; color: #fff; cursor: pointer; z-index: 10000; line-height: 1; }
.lightbox-close:hover { color: #FFB74D; }

/* Markers */
.marker-icon-custom { background: none !important; border: none !important; }
.marker-pin { width: 36px; height: 44px; position: relative; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.2)); }
.marker-pin::before { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 12px solid var(--pin-color); }
.marker-pin-body { width: 36px; height: 36px; border-radius: 50% 50% 50% 0; background: var(--pin-color); transform: rotate(-45deg); position: absolute; top: 0; left: 0; border: 3px solid #fff; box-shadow: inset 0 -2px 4px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; }
.marker-pin-emoji { transform: rotate(45deg); font-size: 16px; line-height: 1; position: absolute; }

/* Pulsing highlight marker */
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
.marker-pin.pulse { animation: pulse 0.6s ease-in-out 3; }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 8px 12px; }
  .header-title { font-size: 16px; }
  .header-subtitle { display: none; }
  .search-wrap input { width: 140px; font-size: 12px; }
  .sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 280px; min-width: 280px; border-right: 2px solid var(--border); box-shadow: 4px 0 20px rgba(0,0,0,0.12); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-toggle { display: flex; align-items: center; justify-content: center; }
  .custom-popup .leaflet-popup-content { max-width: 260px; }
}
@media (max-width: 480px) {
  .header-logo { font-size: 24px; }
  .header-title { font-size: 14px; }
  .search-wrap input { width: 110px; }
}
</style>
</head>

      <div class="stats-row"><span>当前显示</span><b id="visibleCount" style="color:#4CAF50;">0</b></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var RESOURCE_DATA = __DATA_PLACEHOLDER__;
</script>
<script>
(function() {
  var allItems = [];
  var categories = [];
  var checkedCats = {};  // catId -> true = checked (visible)
  var expandedCats = {}; // catId -> true = expanded in sidebar
  var markers = [];
  var markerMap = {};    // item.id -> marker
  var itemRows = {};     // item.id -> DOM row
  var map;

  var CAT_ICONS = {
    nature:'🌳', commercial:'🛒', welfare:'💚',
    government:'🏫', culture:'🎭', education:'🎓', other:'📌'
  };

  function init() {
    var data = RESOURCE_DATA;
    categories = data.categories;

    // Flatten items
    categories.forEach(function(cat) {
      checkedCats[cat.id] = true; // all checked by default
      (cat.items || []).forEach(function(item) {
        allItems.push({
          name: item.name,
          id: item.id,
          distance: item.distance,
          lat: item.lat,
          lng: item.lng,
          feature: item.featureUpdated || item.feature || '',
          activities: item.activitiesUpdated || item.activities || '',
          notes: item.notes || '',
          photos: item.photos || [],
          baiduImageUrl: item.baiduImageUrl || '',
          _catId: cat.id,
          _catName: cat.name,
          _catColor: cat.color,
          _catIcon: cat.icon || CAT_ICONS[cat.id] || '📍'
        });
      });
    });

    document.getElementById('totalCount').textContent = allItems.length;
    updateVisibleCount();

    // Init map
    map = L.map('map', {
      center: [data.center.lat, data.center.lng],
      zoom: 13,
      zoomControl: true,
    });

    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
      subdomains: ['1','2','3','4'],
      attribution: '&copy; <a href="https://www.amap.com/">高德地图</a>',
      maxZoom: 18,
    }).addTo(map);

    // Kindergarten marker
    var kinderIcon = L.divIcon({
      className: 'marker-icon-custom',
      html: '<div style="width:48px;height:56px;position:relative;filter:drop-shadow(0 4px 8px rgba(233,30,99,0.35));"><div style="width:48px;height:48px;border-radius:50% 50% 50% 0;background:linear-gradient(135deg,#FF6B8A,#E91E63);transform:rotate(-45deg);position:absolute;top:0;left:0;border:3px solid #fff;box-shadow:inset 0 -2px 4px rgba(0,0,0,0.15);"></div><div style="position:absolute;top:8px;left:8px;font-size:24px;z-index:1;">🏫</div><div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:16px solid #E91E63;"></div></div>',
      iconSize: [48, 56], iconAnchor: [24, 56], popupAnchor: [0, -56],
    });

    var km = L.marker([data.center.lat, data.center.lng], { icon: kinderIcon }).addTo(map);
    km.bindPopup('<div style="text-align:center;padding:12px;"><div style="font-family:\'ZCOOL KuaiLe\',cursive;font-size:20px;color:#E91E63;">🏫 ' + data.center.name + '</div><div style="font-size:12px;color:#8B7355;margin-top:4px;">' + (data.center.address || '') + '</div><div style="margin-top:10px;padding:6px 14px;background:#FFF0F3;border-radius:12px;font-size:12px;color:#C2185B;">⭐ 当前位置</div></div>');

    buildSidebar();
    renderMarkers();
    bindSearch();
    bindSidebarToggle();
  }

  function updateVisibleCount() {
    var count = allItems.filter(function(item) { return checkedCats[item._catId]; }).length;
    document.getElementById('visibleCount').textContent = count;
  }

  // --- Marker icon ---
  function makeIcon(item) {
    return L.divIcon({
      className: 'marker-icon-custom',
      html: '<div class="marker-pin" id="pin-' + item.id + '" style="--pin-color:' + item._catColor + '"><div class="marker-pin-body"><span class="marker-pin-emoji">' + item._catIcon + '</span></div></div>',
      iconSize: [36, 44], iconAnchor: [18, 44], popupAnchor: [0, -44],
    });
  }

  // --- Popup ---
  function buildPopup(item) {
    var actList = item.activities.split(/[,，、]/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
    var tagsHtml = actList.length > 0
      ? '<div class="popup-tags">' + actList.map(function(a) { return '<span class="popup-tag">' + a + '</span>'; }).join('') + '</div>'
      : '';
    var notesHtml = item.notes ? '<div class="popup-note">💡 ' + item.notes + '</div>' : '';

    // Photos with lightbox
    var photosHtml = '';
    var p = item.photos || [];
    if (p.length > 0) {
      photosHtml = '<div class="popup-photos">' + p.map(function(url) { return '<img src="' + url + '" alt="实景" loading="lazy" onclick="showLightbox(\'' + url + '\')" />'; }).join('') + '</div>';
    }

    return '<div class="popup-card"><div class="popup-header"><div class="popup-name">' + item.name + '</div><span class="popup-cat-tag" style="background:' + item._catColor + '">' + item._catName + '</span></div><div class="popup-body"><div class="popup-row"><span class="popup-label">📏</span><span class="popup-value">距离幼儿园约 <b>' + item.distance + ' 公里</b></span></div>' + (item.feature ? '<div class="popup-row"><span class="popup-label">✨</span><span class="popup-value">' + item.feature + '</span></div>' : '') + (actList.length > 0 ? '<span class="popup-section-title">🎯 适合的活动</span>' + tagsHtml : '') + notesHtml + photosHtml + '</div></div>';
  }

  // --- Render markers ---
  function renderMarkers() {
    markers.forEach(function(m) { map.removeLayer(m); });
    markers = [];
    markerMap = {};

    allItems.forEach(function(item) {
      if (!item.lat || !item.lng) return;
      if (!checkedCats[item._catId]) return;

      var marker = L.marker([item.lat, item.lng], { icon: makeIcon(item) })
        .addTo(map)
        .bindPopup(buildPopup(item), { className: 'custom-popup', maxWidth: 340, closeButton: true });

      marker.on('mouseover', function() { this.openPopup(); });
      marker.on('click', function() {
        // Highlight sidebar row
        highlightSidebarItem(item.id);
      });
      markers.push(marker);
      markerMap[item.id] = marker;
    });

    updateVisibleCount();
    updateSidebarItemStyles();
  }

  // --- Build sidebar ---
  function buildSidebar() {
    var accordion = document.getElementById('catAccordion');
    var legendBox = document.getElementById('legendBox');
    accordion.innerHTML = '';
    legendBox.innerHTML = '';
    itemRows = {};

    categories.forEach(function(cat) {
      var items = cat.items || [];

      // Legend
      legendBox.innerHTML += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:' + cat.color + ';flex-shrink:0;"></span><span>' + cat.name + '（' + items.length + '个）</span></div>';

      // Category group
      var group = document.createElement('div');
      group.className = 'cat-group active-group';
      group.setAttribute('data-cat', cat.id);

      // Header
      var header = document.createElement('div');
      header.className = 'cat-header';

      var cb = document.createElement('span');
      cb.className = 'cat-checkbox checked';
      cb.style.backgroundColor = cat.color;

      var dot = document.createElement('span');
      dot.className = 'cat-dot-sm';
      dot.style.backgroundColor = cat.color;

      var name = document.createElement('span');
      name.className = 'cat-name-sm';
      name.textContent = (cat.icon || '') + ' ' + cat.name;

      var count = document.createElement('span');
      count.className = 'cat-count-sm';
      count.textContent = items.length;

      var arrow = document.createElement('span');
      arrow.className = 'cat-arrow';
      arrow.textContent = '▶';

      header.appendChild(cb);
      header.appendChild(dot);
      header.appendChild(name);
      header.appendChild(count);
      header.appendChild(arrow);

      // Click header -> toggle checkbox
      header.addEventListener('click', function(e) {
        // Don't toggle if clicking arrow area specifically? Actually do both.
        toggleCategoryCheck(cat.id, cb, group);
      });

      // Item list
      var itemsDiv = document.createElement('div');
      itemsDiv.className = 'cat-items';

      items.forEach(function(item) {
        var row = document.createElement('div');
        row.className = 'cat-item-row';
        row.innerHTML = '<span class="item-icon">📍</span><span class="item-name">' + item.name + '</span><span class="item-dist">' + item.distance + 'km</span>';

        row.addEventListener('click', function(e) {
          e.stopPropagation();
          flyToItem(item);
        });

        itemsDiv.appendChild(row);
        itemRows[item.id] = row;
      });

      group.appendChild(header);
      group.appendChild(itemsDiv);
      accordion.appendChild(group);

      // Arrow click -> expand/collapse
      arrow.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleExpand(cat.id, itemsDiv, arrow);
      });

      // Header click also expands first time
      var clickedOnce = false;
      header.addEventListener('click', function(e) {
        if (!clickedOnce) {
          toggleExpand(cat.id, itemsDiv, arrow);
          clickedOnce = true;
        }
      }, { once: false }); // actually we need separate handler; let's simplify
    });

    // Actually redo: header click = toggle checkbox only, arrow = expand
    // Let me fix the double binding above by clearing and redoing
    fixCategoryHandlers();
  }

  function fixCategoryHandlers() {
    var groups = document.querySelectorAll('.cat-group');
    groups.forEach(function(group) {
      var catId = group.getAttribute('data-cat');
      var header = group.querySelector('.cat-header');
      var cb = header.querySelector('.cat-checkbox');
      var arrow = header.querySelector('.cat-arrow');
      var itemsDiv = group.querySelector('.cat-items');

      // Remove old listeners by cloning
      var newHeader = header.cloneNode(true);
      header.parentNode.replaceChild(newHeader, header);

      var newArrow = newHeader.querySelector('.cat-arrow');
      var newCb = newHeader.querySelector('.cat-checkbox');

      newHeader.addEventListener('click', function() {
        toggleCategoryCheck(catId, newCb, group);
      });

      newArrow.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleExpand(catId, itemsDiv, newArrow);
      });
    });
  }

  function toggleCategoryCheck(catId, cbEl, groupEl) {
    checkedCats[catId] = !checkedCats[catId];
    if (checkedCats[catId]) {
      cbEl.classList.add('checked');
      groupEl.classList.add('active-group');
    } else {
      cbEl.classList.remove('checked');
      groupEl.classList.remove('active-group');
    }
    renderMarkers();
  }

  function toggleExpand(catId, itemsDiv, arrowEl) {
    var isOpen = itemsDiv.classList.contains('open');
    if (isOpen) {
      itemsDiv.classList.remove('open');
      arrowEl.classList.remove('open');
      expandedCats[catId] = false;
    } else {
      itemsDiv.classList.add('open');
      arrowEl.classList.add('open');
      expandedCats[catId] = true;
    }
  }

  // --- Fly to item from sidebar ---
  function flyToItem(item) {
    if (!item.lat || !item.lng) return;
    map.setView([item.lat, item.lng], 16, { animate: true });

    // Open popup
    var marker = markerMap[item.id];
    if (marker) {
      marker.openPopup();
      // Pulse animation
      var pin = document.getElementById('pin-' + item.id);
      if (pin) {
        pin.classList.add('pulse');
        setTimeout(function() { pin.classList.remove('pulse'); }, 2000);
      }
    }

    highlightSidebarItem(item.id);
  }

  function highlightSidebarItem(id) {
    // Remove all highlights
    Object.keys(itemRows).forEach(function(k) {
      itemRows[k].classList.remove('highlight');
    });
    var row = itemRows[id];
    if (row) {
      row.classList.add('highlight');
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function updateSidebarItemStyles() {
    Object.keys(itemRows).forEach(function(id) {
      var item = allItems.find(function(it) { return it.id === id; });
      if (item && !checkedCats[item._catId]) {
        itemRows[id].style.opacity = '0.35';
      } else {
        itemRows[id].style.opacity = '1';
      }
    });
  }

  // --- Search ---
  function bindSearch() {
    var input = document.getElementById('searchInput');
    var timer;
    input.addEventListener('input', function() {
      clearTimeout(timer);
      timer = setTimeout(function() {
        var q = input.value.trim().toLowerCase();
        if (!q) { renderMarkers(); return; }
        searchMarkers(q);
      }, 300);
    });
  }

  function searchMarkers(q) {
    markers.forEach(function(m) { map.removeLayer(m); });
    markers = [];

    var matched = allItems.filter(function(item) {
      if (!item.lat || !item.lng) return false;
      if (!checkedCats[item._catId]) return false;
      return item.name.toLowerCase().indexOf(q) >= 0 ||
             item.feature.toLowerCase().indexOf(q) >= 0 ||
             item.activities.toLowerCase().indexOf(q) >= 0;
    });

    // Highlight matching rows in sidebar
    Object.keys(itemRows).forEach(function(id) {
      itemRows[id].classList.remove('highlight');
    });

    matched.forEach(function(item) {
      var marker = L.marker([item.lat, item.lng], { icon: makeIcon(item) })
        .addTo(map)
        .bindPopup(buildPopup(item), { className: 'custom-popup', maxWidth: 340 });
      markers.push(marker);

      if (itemRows[item.id]) {
        itemRows[item.id].classList.add('highlight');
      }
    });

    if (matched.length > 0) {
      var group = L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.2), { maxZoom: 15 });
    }

    updateVisibleCount();
  }

  // --- Mobile sidebar ---
  function bindSidebarToggle() {
    var btn = document.getElementById('sidebarToggle');
    var sidebar = document.getElementById('sidebar');
    btn.addEventListener('click', function() { sidebar.classList.toggle('open'); });
    document.querySelector('.map-container').addEventListener('click', function() {
      if (window.innerWidth <= 768) sidebar.classList.remove('open');
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // --- Lightbox ---
  window.showLightbox = function(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('show');
  };
  window.hideLightbox = function() {
    document.getElementById('lightbox').classList.remove('show');
  };
})();
</script>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox" onclick="hideLightbox()">
  <span class="lightbox-close">&times;</span>
  <img id="lightboxImg" src="" alt="实景大图" />
</div>

</body>
</html>
